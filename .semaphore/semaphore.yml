version: v1.0
name: M02 tests
agent:
  machine:
    type: f1-standard-2
    os_image: ubuntu2404
fail_fast:
  stop:
    when: branch != 'main'
auto_cancel:
  running:
    when: branch != 'main'
  queued:
    when: branch = 'main'
global_job_config:
  prologue:
    commands:
      - sem-version python 3.12
      - checkout
      - mkdir -p pip_cache
blocks:
  - name: Install dependencies
    dependencies: []
    task:
      jobs:
        - name: "\U0001F7E2 Run Tests"
          commands:
            - pip install pytest requests flask coverage locust
  - name: Unit Tests
    dependencies:
      - Install dependencies
    task:
      jobs:
        - name: 2 unit testing
          commands:
            - cd 1-tdd && python -m pytest test_factorial.py -v
            - cd ../2-unit-testing && python -m pytest test_math_sum.py -v
  - name: Integration tests
    dependencies:
      - Unit Tests
    task:
      jobs:
        - name: 3-integration testing
          commands:
            - cd 3-integration-testing && python -m pytest test_integration.py -v
  - name: End-to-end tests
    dependencies:
      - Integration tests
    task:
      jobs:
        - name: End-to-End tests
          commands:
            - cd 4-e2e && nohup python app.py &
            - sleep 3
            - python -m pytest test_e2e.py -v
  - name: Test Reports
    dependencies:
      - End-to-end tests
    task:
      jobs:
        - name: Reports
          commands:
            - cd 5-test-reports
            - pip install -r requirements.txt
            - pytest --junitxml=reports.xml
            - '[[ -f report.xml ]] && test-results publish report.xml'
after_pipeline:
  task:
    jobs:
      - name: test reports
        commands:
          - test-results gen-pipeline-report
